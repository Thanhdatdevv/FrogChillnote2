<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/png" href="https://files.catbox.moe/005iw6.png" />
    <title>Mưa Tình Yêu Tặng Nhím 💌</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

    <style>
        /* --- ĐỊNH DẠNG CHUNG --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100vw; height: 100vh; overflow: hidden; 
            font-family: 'Poppins', sans-serif; 
            background-color: #030108; 
            position: relative; 
        }

        /* --- MÀN HÌNH 1: MENU CÂU HỎI --- */
        #menu-container { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 200; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: linear-gradient(rgba(255, 102, 178, 0.4), rgba(255, 153, 200, 0.4)), url('https://files.catbox.moe/6v7y8j.jpg') no-repeat center center/cover;
            transition: opacity 1s ease; 
        }
        #menu-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .menu-content { position: relative; z-index: 2; text-align: center; padding: 30px; max-width: 400px; width: 90%; background: rgba(255, 255, 255, 0.25); border-radius: 20px; backdrop-filter: blur(10px); border: 2px solid rgba(255, 255, 255, 0.4); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .menu-title { color: #ffffff; font-size: 26px; font-weight: bold; margin-bottom: 35px; }
        .btn-wrap { position: relative; width: 100%; height: 60px; display: flex; justify-content: space-between; align-items: center; }
        .btn { width: 110px; height: 48px; font-size: 16px; font-weight: bold; border: none; border-radius: 25px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        #btn-yes { background: linear-gradient(45deg, #ff007f, #ff416c); color: white; border: 2px solid rgba(255,255,255,0.3); }
        #btn-no { position: absolute; right: 0; top: 6px; background: #ffffff; color: #ff416c; border: 2px solid #ff416c; transition: left 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), top 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* --- MÀN HÌNH 2: VŨ TRỤ MƯA CHỮ --- */
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; z-index: 10; }
        #aura-overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; background: radial-gradient(circle at 15% 25%, rgba(60, 220, 100, 0.55) 0%, transparent 50%), radial-gradient(circle at 85% 30%, rgba(255, 30, 180, 0.6) 0%, transparent 55%), radial-gradient(circle at 50% 80%, rgba(140, 30, 255, 0.5) 0%, transparent 50%), radial-gradient(circle at 50% 45%, rgba(255, 200, 255, 0.25) 0%, transparent 40%); filter: blur(55px); mix-blend-mode: screen; pointer-events: none; animation: auraMotion 10s infinite alternate ease-in-out; }
        @keyframes auraMotion { 0% { transform: scale(1); opacity: 0.9; } 100% { transform: scale(1.15); opacity: 1; } }
        #shooting-stars-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }
        #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; }
        
        .go-to-letter-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            z-index: 100; padding: 14px 30px; font-size: 16px; font-weight: bold;
            color: white; background: linear-gradient(45deg, #ff007f, #ff416c);
            border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 30px;
            cursor: pointer; box-shadow: 0 8px 25px rgba(255, 0, 127, 0.4);
            transition: all 0.3s ease; animation: bounceBtn 2s infinite ease-in-out;
        }
        @keyframes bounceBtn { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-6px); } }

        /* --- PHONG BÌ THƯ --- */
        #letter-modal {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 150; display: none; flex-direction: column; align-items: center;
            background: rgba(3, 1, 8, 0.92); backdrop-filter: blur(8px);
            opacity: 0; transition: opacity 0.6s ease; overflow: hidden;
        }

        .envelope-wrapper { width: 320px; height: 320px; margin-top: 15vh; position: relative; }

        #envelope {
            position: relative; width: 300px; height: 190px;  
            border-bottom-left-radius: 6px; border-bottom-right-radius: 6px;
            margin: 0 auto; top: 80px; background-color: #ff8da1;
            box-shadow: 0 4px 25px rgba(0,0,0,.5); z-index: 10;
        }

        .front { position: absolute; width: 0; height: 0; }
        .flap {
            border-left: 150px solid transparent; border-right: 150px solid transparent;
            border-bottom: 72px solid transparent; border-top: 120px solid #ff8da1;
            transform-origin: top; pointer-events: none; top: 0; left: 0;
        }
        .pocket {
            border-left: 150px solid #FFB7C5; border-right: 150px solid #FFB7C5;
            border-bottom: 70px solid #ff9aad; border-top: 120px solid transparent;
            border-bottom-left-radius: 6px; border-bottom-right-radius: 6px; top: 0; left: 0; z-index: 5;
        }

        .letter {
            position: absolute; background-color: #ffffff; 
            width: 92%; left: 4%; height: 90%; top: 10px; 
            border-radius: 6px; box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 15px; box-sizing: border-box;
            border: 1px solid rgba(0, 0, 0, 0.06); z-index: 2;
            transition: transform 0.5s ease, z-index 0.5s ease, height 0.5s ease;
            overflow: hidden;
        }

        .close .flap { transform: rotateX(0deg); transition: transform 0.4s 0.4s ease; z-index: 6; }
        .open .flap { transform: rotateX(180deg); transition: transform 0.4s ease; z-index: 1; }
        .close .letter { transform: translateY(0px); transition: transform 0.4s ease; z-index: 2; }
        .open .letter { transform: translateY(-100px); transition: transform 0.4s 0.4s ease; z-index: 6; height: 180px; }

        .message {
            position: relative; z-index: 2;
            font-family: 'Dancing Script', cursive;
            font-size: 21px; font-weight: bold; line-height: 1.4; text-align: left;
            color: #d63384; 
            text-shadow: 0px 1px 1px rgba(255, 182, 193, 0.5);
            word-wrap: break-word; display: inline-block; width: 100%; height: 125px;
            overflow: hidden;
        }

        .lyric-page { display: none; width: 100%; position: relative; }
        .lyric-page.active { display: block; }

        .typed-cursor { opacity: 1; animation: blink 0.7s infinite; color: #ff416c; font-weight: bold; margin-left: 2px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- CĂN CHỈNH VỊ TRÍ ẢNH CHUẨN XÁC THEO YÊU CẦU --- */
        .photo-corner-frame {
            position: absolute; width: 75px; height: 75px; z-index: 100;
            background: #ffffff; padding: 4px; border-radius: 4px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.5);
            opacity: 0; transform: scale(0); 
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .photo-corner-frame img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }
        
        .photo-corner-frame::before {
            content: '📌'; position: absolute; top: -11px; left: 50%;
            transform: translateX(-50%); font-size: 13px; z-index: 105;
        }

        .open-photos .photo-corner-frame { opacity: 1; }

        /* 2 Tấm gốc trên: Nhích lên một tí xíu */
        #photo-top-left { top: -68px; left: -10px; transform: scale(0) rotate(-8deg); }
        .open-photos #photo-top-left { transform: scale(1) rotate(-8deg); }

        #photo-top-right { top: -68px; right: -10px; transform: scale(0) rotate(10deg); }
        .open-photos #photo-top-right { transform: scale(1) rotate(10deg); }

        #photo-top-center { top: -72px; left: 50%; transform: translateX(-50%) scale(0) rotate(2deg); }
        .open-photos #photo-top-center { transform: translateX(-50%) scale(1) rotate(2deg); }

        /* 2 Tấm phía dưới: Nhích lên mạnh để dính vào màu hồng phong bì */
        #photo-bottom-left-letter { bottom: -40px; left: -10px; width: 82px; height: 82px; transform: scale(0) rotate(-12deg); }
        .open-photos #photo-bottom-left-letter { transform: scale(1) rotate(-12deg); }

        #photo-bottom-right-letter { bottom: -40px; right: -10px; width: 82px; height: 82px; transform: scale(0) rotate(12deg); }
        .open-photos #photo-bottom-right-letter { transform: scale(1) rotate(12deg); }


        /* --- CẬU BÉ SHIN CHÀO MỪNG --- */
        #shin-intro-container {
            position: fixed; bottom: -180px; right: 15px; 
            z-index: 180; display: flex; flex-direction: column; align-items: flex-end;
            transition: bottom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #shin-intro-container.show { bottom: 10px; }
        
        #shin-bubble {
            background: white; border: 3px solid #ff416c; border-radius: 15px;
            padding: 8px 16px; font-weight: bold; color: #ff416c; font-size: 14px;
            position: relative; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            opacity: 0; transform: scale(0.6); transition: all 0.3s ease;
            white-space: nowrap;
        }
        #shin-bubble.show { opacity: 1; transform: scale(1); }
        #shin-bubble::after { content: ''; position: absolute; bottom: -12px; right: 25px; border-width: 12px 12px 0; border-style: solid; border-color: white transparent; display: block; width: 0; }
        #shin-bubble::before { content: ''; position: absolute; bottom: -16px; right: 24px; border-width: 13px 13px 0; border-style: solid; border-color: #ff416c transparent; display: block; width: 0; z-index: -1; }
        .shin-img-a { width: 95px; height: auto; }

        #shin-writer {
            position: absolute; width: 42px; height: auto; z-index: 20;
            pointer-events: none; display: none;
            transform: translate(-14px, -18px);
        }
        .writing-animation { animation: shinWrite 0.2s infinite alternate ease-in-out; }
        @keyframes shinWrite {
            0% { transform: translate(-14px, -18px) translateY(0px) rotate(0deg); }
            100% { transform: translate(-14px, -18px) translateY(-2px) rotate(3deg); }
        }

        /* --- DỊCH CHUYỂN NÚT SANG TRÁI NÉ CU SHIN --- */
        .controls { 
            position: absolute; bottom: 24vh; left: 50%; transform: translateX(-62%); 
            z-index: 190; text-align: center; pointer-events: none;
        }
        .controls button { 
            font-weight: 600; transition: all 0.3s ease; 
            background: linear-gradient(45deg, #ff007f, #ff416c); 
            border: 2px solid rgba(255,255,255,0.5); border-radius: 25px; 
            color: white; padding: 14px 35px; font-size: 16px; 
            cursor: pointer; box-shadow: 0 6px 20px rgba(255, 0, 127, 0.5); 
            display: none; pointer-events: auto;
        }
        .page-num-counter { font-size: 12px; color: #888; text-align: center; margin-top: 5px; font-family: sans-serif; position: relative; z-index: 5; }
    </style>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

    <script type="importmap">
        {
            "imports": {

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ĐỒNG BỘ 5 LINK CATBOX CHUẨN XÁC
        const ANH_1 = "https://files.catbox.moe/x82yje.jpg"; 
        const ANH_2 = "https://files.catbox.moe/sw26rg.jpg";
        const ANH_3 = "https://files.catbox.moe/005iw6.png";
        const ANH_4 = "https://files.catbox.moe/aib13j.png";
        const ANH_5 = "https://files.catbox.moe/ki2grz.png";

        $('#photo-top-left img').attr('src', ANH_1);
        $('#photo-top-right img').attr('src', ANH_2);
        $('#photo-top-center img').attr('src', ANH_3);
        $('#photo-bottom-left-letter img').attr('src', ANH_4);
        $('#photo-bottom-right-letter img').attr('src', ANH_5);

        let isFirstTime = true;
        const audio = document.getElementById('sound');

        function forcePlayAudio() {
            if(audio && audio.paused) {
                audio.play().then(() => {
                    window.removeEventListener('click', forcePlayAudio);
                    window.removeEventListener('touchstart', forcePlayAudio);
                }).catch(e => console.log("Chờ kích hoạt", e));
            }
        }
        window.addEventListener('click', forcePlayAudio);
        window.addEventListener('touchstart', forcePlayAudio);

        const mCanvas = document.getElementById('menu-canvas');
        const mCtx = mCanvas.getContext('2d');
        let menuHearts = [];
        function resizeMenuCanvas() { mCanvas.width = window.innerWidth; mCanvas.height = window.innerHeight; }
        resizeMenuCanvas(); window.addEventListener('resize', resizeMenuCanvas);

        class MenuHeart {
            constructor() { this.x = Math.random() * mCanvas.width; this.y = mCanvas.height + Math.random() * 100; this.size = Math.random() * 12 + 6; this.speed = Math.random() * 1.2 + 0.6; this.opacity = Math.random() * 0.4 + 0.3; this.swing = Math.random() * 2; }
            draw() { mCtx.save(); mCtx.globalAlpha = this.opacity; mCtx.fillStyle = '#ffffff'; mCtx.beginPath(); mCtx.moveTo(this.x, this.y); mCtx.bezierCurveTo(mCanvas.width, this.y, this.x, this.y); mCtx.fill(); mCtx.restore(); }
            update(time) { this.y -= this.speed; this.x += Math.sin(time * 0.002 + this.swing) * 0.4; if (this.y < -50) { this.y = mCanvas.height + 50; this.x = Math.random() * mCanvas.width; } }
        }
        for(let i=0; i<35; i++) menuHearts.push(new MenuHeart());
        function animateMenu(time) { if(document.getElementById('menu-container').style.display === 'none') return; requestAnimationFrame(animateMenu); mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height); menuHearts.forEach(h => { h.update(time); h.draw(); }); }
        requestAnimationFrame(animateMenu);

        const btnNo = document.getElementById('btn-no');
        const btnWrap = document.querySelector('.btn-wrap');
        function flee() { const maxX = btnWrap.offsetWidth - btnNo.offsetWidth; const randomX = Math.random() * maxX; const randomY = (Math.random() - 0.5) * 160; btnNo.style.left = `${randomX}px`; btnNo.style.top = `${randomY}px`; }
        btnNo.addEventListener('mouseenter', flee); btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); flee(); });

        document.getElementById('btn-yes').addEventListener('click', () => {
            forcePlayAudio();
            document.getElementById('menu-container').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('menu-container').style.display = 'none';
                document.getElementById('game-container').style.opacity = 1;
                document.getElementById('game-container').style.pointerEvents = 'auto';
                init3DScene();
            }, 1000);
        });

        let scene, camera, renderer, controls, fallingObjects = [];
        function init3DScene() {
            if(!isFirstTime) return; isFirstTime = false;
            const ssCanvas = document.getElementById('shooting-stars-canvas');
            const ssCtx = ssCanvas.getContext('2d');
            ssCanvas.width = window.innerWidth; ssCanvas.height = window.innerHeight;
            const starList = [];
            for(let i=0; i<18; i++) { starList.push({ x: Math.random() * window.innerWidth * 1.5, y: Math.random() * -window.innerHeight * 0.5, length: Math.random() * 80 + 50, speed: Math.random() * 9 + 6, opacity: Math.random() * 0.6 + 0.4 }); }

            function drawShootingStars() {
                ssCtx.clearRect(0, 0, ssCanvas.width, ssCanvas.height);
                starList.forEach((star, index) => {
                    star.x -= star.speed; star.y += star.speed * 0.75;
                    ssCtx.beginPath();
                    const grad = ssCtx.createLinearGradient(star.x, star.y, star.x + star.length, star.y - star.length * 0.75);
                    grad.addColorStop(0, `rgba(255, 255, 255, ${star.opacity})`); grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ssCtx.strokeStyle = grad; ssCtx.lineWidth = 2; ssCtx.moveTo(star.x, star.y); ssCtx.lineTo(star.x + star.length, star.y - star.length * 0.75); ssCtx.stroke();
                    if (star.x < -100 || star.y > window.innerHeight + 100) { starList[index] = { x: Math.random() * window.innerWidth * 1.5, y: Math.random() * -window.innerHeight * 0.3, length: Math.random() * 80 + 50, speed: Math.random() * 9 + 6, opacity: Math.random() * 0.6 + 0.4 }; }
                });
            }

            const container = document.getElementById('webgl-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, -18, 40);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.dampingFactor = 0.05;
            controls.autoRotate = true; controls.autoRotateSpeed = 0.22;
            controls.enableZoom = false; controls.minPolarAngle = Math.PI / 1.9; controls.maxPolarAngle = Math.PI / 1.8;

            const textStrings = ["nhím💗", "I love u💗", "I miss u💗", "U are my wife💗"];
            const colorStyles = ['neon-cyan', 'hot-pink', 'gold-yellow', 'purple-blue', 'rainbow-bright'];
            const textureCache = {};

            textStrings.forEach(text => {
                textureCache[text] = {};
                colorStyles.forEach(style => {
                    const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 128;
                    const ctx = canvas.getContext('2d'); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.font = 'italic bold 54px "Arial Rounded MT Bold", sans-serif'; ctx.shadowBlur = 25;
                    if (style === 'neon-cyan') { ctx.fillStyle = '#e6ffff'; ctx.shadowColor = '#00ffff'; }
                    else if (style === 'hot-pink') { ctx.fillStyle = '#fff0f5'; ctx.shadowColor = '#ff1493'; }
                    else if (style === 'gold-yellow') { ctx.fillStyle = '#ffffcc'; ctx.shadowColor = '#ffd700'; }
                    else if (style === 'purple-blue') { const g = ctx.createLinearGradient(100,0,412,0); g.addColorStop(0,'#00f2fe'); g.addColorStop(1,'#4facfe'); ctx.fillStyle = g; ctx.shadowColor = '#00f2fe'; }
                    else { const g = ctx.createLinearGradient(80,0,432,0); g.addColorStop(0,'#ff007f'); g.addColorStop(0.5,'#ff00ff'); g.addColorStop(1,'#00ffff'); ctx.fillStyle = g; ctx.shadowColor = '#ff00ff'; }
                    ctx.fillText(text, canvas.width/2, canvas.height/2);
                    ctx.shadowBlur = 0; ctx.fillStyle = '#ffffff'; ctx.fillText(text, canvas.width/2, canvas.height/2);
                    textureCache[text][style] = new THREE.CanvasTexture(canvas);
                });
            });

            // Mảng chứa toàn bộ 5 link ảnh để sinh hiệu ứng rơi ngẫu nhiên
            const catboxImages = [ANH_1, ANH_2, ANH_3, ANH_4, ANH_5];
            const texturePromises = catboxImages.map(url => createHeartTexture(url));

            function createHeartTexture(imgUrl) {
                return new Promise((res) => {
                    const img = new Image(); img.crossOrigin = "Anonymous"; img.src = imgUrl;
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
                        const ctx = canvas.getContext('2d'); ctx.beginPath(); ctx.moveTo(128, 60);
                        ctx.bezierCurveTo(128,15,0,15,0,100); ctx.bezierCurveTo(0,180,128,240,128,240); ctx.bezierCurveTo(128,240,256,180,256,100); ctx.bezierCurveTo(256,15,128,15,128,60);
                        ctx.closePath(); ctx.clip(); ctx.drawImage(img, 0, 0, 256, 256);
                        ctx.lineWidth = 8; ctx.strokeStyle = "rgba(255, 255, 255, 0.9)"; ctx.stroke();
                        res(new THREE.CanvasTexture(canvas));
                    };
                    img.onerror = () => { res(null); }
                });
            }

            const textGeo = new THREE.PlaneGeometry(15, 3.75); const imageGeo = new THREE.PlaneGeometry(6, 6);

            async function buildRain() {
                const totalObjects = 240;
                const loadedTextures = (await Promise.all(texturePromises)).filter(t => t !== null);
                
                for (let i = 0; i < totalObjects; i++) {
                    const isText = Math.random() > 0.3; let mat, mesh;
                    if (isText) {
                        const txt = textStrings[Math.floor(Math.random() * textStrings.length)]; const stl = colorStyles[Math.floor(Math.random() * colorStyles.length)];
                        mat = new THREE.MeshBasicMaterial({ map: textureCache[txt][stl], transparent: true, depthWrite: false, side: THREE.DoubleSide });
                        mesh = new THREE.Mesh(textGeo, mat);
                    } else if(loadedTextures.length > 0) {
                        // Lấy ngẫu nhiên 1 trong 5 texture ảnh đã load để tạo hiệu ứng rơi phong phú
                        const randomTex = loadedTextures[Math.floor(Math.random() * loadedTextures.length)];
                        mat = new THREE.MeshBasicMaterial({ map: randomTex, transparent: true, depthWrite: false, side: THREE.DoubleSide });
                        mesh = new THREE.Mesh(imageGeo, mat);
                    } else { continue; }
                    resetObj(mesh, true); scene.add(mesh); fallingObjects.push(mesh);
                }
            }

            function resetObj(obj, randomY = false) {
                obj.position.x = (Math.random() - 0.5) * 95; obj.position.z = (Math.random() - 0.5) * 50;
                obj.position.y = randomY ? (Math.random() * 90 - 40) : (50 + Math.random() * 15);
                obj.userData = { speed: 0.16 + Math.random() * 0.24, opacity: 1.0 }; obj.material.opacity = 1.0;
            }
            buildRain();

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight); camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                ssCanvas.width = window.innerWidth; ssCanvas.height = window.innerHeight;
            });

            function run(time) {
                requestAnimationFrame(run); controls.update(); drawShootingStars();
                fallingObjects.forEach(obj => {
                    obj.position.y -= obj.userData.speed; obj.position.x += Math.sin(time * 0.001 + obj.position.y) * 0.008;
                    if (obj.position.y < -15) { obj.userData.opacity -= 0.04; obj.material.opacity = Math.max(0, obj.userData.opacity); }
                    if (obj.position.y < -35 || obj.material.opacity <= 0) { resetObj(obj, false); }
                });
                renderer.render(scene, camera);
            }
            requestAnimationFrame(run);
        }

        const letterModal = document.getElementById('letter-modal');
        const shinIntro = document.getElementById('shin-intro-container');
        const shinBubble = document.getElementById('shin-bubble');
        const openBtn = document.getElementById('openBtn');

        document.getElementById('goLetterBtn').addEventListener('click', () => {
            letterModal.style.display = 'flex';
            setTimeout(() => { letterModal.style.opacity = 1; }, 50);

            setTimeout(() => {
                shinIntro.classList.add('show');
                shinBubble.classList.add('show');
            }, 600);

            setTimeout(() => { shinBubble.innerText = "sắp xong ruiiii💗"; }, 3400);
            setTimeout(() => { shinBubble.innerText = "xong roii đây💗"; }, 6200);

            setTimeout(() => { 
                shinBubble.innerText = "mở thư đi bảo bốiii💗"; 
                openBtn.style.display = "inline-block"; 
            }, 9000);
        });

        window.closeLetterAndModal = function() { 
            letterModal.style.opacity = 0; 
            shinIntro.classList.remove('show');
            shinBubble.classList.remove('show');
            openBtn.style.display = "none";
            setTimeout(() => { letterModal.style.display = 'none'; }, 600); 
        }
    </script>

    <script>
        $(document).ready(function () {
            const envelope = $('#envelope');
            const envWrapper = $('#envWrapper');
            const openBtn = $("#openBtn");
            const pageNumDisplay = $("#pageNumDisplay");
            const shinWriter = $("#shin-writer");
            const shinIntro = $("#shin-intro-container");

            let currentPage = 1;
            const totalPages = 23;
            let isOpen = false;
            let typeTimeout = null;
            let autoFlipTimeout = null;

            openBtn.on('click', function (e) {
                e.stopPropagation();
                shinIntro.removeClass('show'); 
                
                envelope.removeClass("close").addClass("open");
                envWrapper.addClass("open-photos"); 
                isOpen = true;
                openBtn.hide();
                
                setTimeout(startTypewriterEffect, 800);
            });

            function startTypewriterEffect() {
                const activePage = $("#page" + currentPage);
                const fullText = activePage.attr('data-text');
                
                activePage.html(''); 
                clearTimeout(typeTimeout);
                clearTimeout(autoFlipTimeout);

                let index = 0;
                activePage.append('<span class="text-holder"></span><span class="typed-cursor">|</span>');
                const textHolder = activePage.find('.text-holder');
                const cursor = activePage.find('.typed-cursor');

                shinWriter.show().addClass('writing-animation');

                function type() {
                    if (index < fullText.length) {
                        textHolder.text(fullText.substring(0, index + 1));
                        index++;

                        if(cursor.length > 0 && cursor.position()) {
                            let posX = cursor.position().left;
                            let posY = cursor.position().top;
                            shinWriter.css({ left: (posX + 10) + 'px', top: (posY + 15) + 'px' });
                        }

                        typeTimeout = setTimeout(type, 65); 
                    } else {
                        shinWriter.removeClass('writing-animation');
                        autoFlipTimeout = setTimeout(nextLyric, 2800); 
                    }
                }
                type();
            }

            function nextLyric() {
                if (currentPage >= totalPages) {
                    foldEnvelopeAndReset();
                    setTimeout(function() {
                        if (typeof window.closeLetterAndModal === 'function') {
                            window.closeLetterAndModal();
                        }
                    }, 600);
                    return;
                }
                currentPage++;
                updateActivePage();
            }

            function updateActivePage() {
                $(".lyric-page").removeClass("active");
                $("#page" + currentPage).addClass("active");
                pageNumDisplay.text("Trang " + currentPage + " / " + totalPages);
                if (isOpen) {
                    startTypewriterEffect();
                }
            }

            function foldEnvelopeAndReset() {
                clearTimeout(typeTimeout);
                clearTimeout(autoFlipTimeout);
                envelope.removeClass("open").addClass("close");
                envWrapper.removeClass("open-photos"); 
                shinWriter.hide();
                isOpen = false;
                setTimeout(function () {
                    currentPage = 1;
                    $(".lyric-page").html(''); 
                    updateActivePage();
                }, 600);
            }
        });
    </script>
</body>
