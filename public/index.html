<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Tài Xỉu FrogChill của đạt</title>
    <style>
        body { background: #0b0f19; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .game-container { width: 100%; max-width: 800px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .main-game { background: #151d30; padding: 20px; border-radius: 12px; border: 1px solid #233253; text-align: center; }
        .chat-section { background: #151d30; padding: 15px; border-radius: 12px; border: 1px solid #233253; display: flex; flex-direction: column; height: 500px; }
        .header-info { display: flex; justify-content: space-between; background: #1e2942; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
        .timer { font-size: 48px; color: #ff9f43; margin: 20px 0; font-weight: bold; text-shadow: 0 0 10px rgba(255,159,67,0.5); }
        .dice-display { font-size: 36px; background: #0b0f19; padding: 15px; border-radius: 50px; display: inline-block; letter-spacing: 10px; margin-bottom: 20px; border: 2px dashed #ff9f43; }
        .bet-buttons { display: flex; gap: 20px; justify-content: center; margin: 20px 0; }
        .btn-bet { padding: 15px 40px; font-size: 20px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; color: white; width: 140px; }
        .btn-tai { background: #ee5253; box-shadow: 0 4px 15px rgba(238,82,83,0.4); }
        .btn-xiu { background: #10ac84; box-shadow: 0 4px 15px rgba(16,172,132,0.4); }
        .btn-bet:active { transform: scale(0.95); }
        .bet-input { background: #1e2942; border: 1px solid #34495e; color: white; padding: 10px; border-radius: 6px; width: 60%; font-size: 16px; text-align: center; }
        .history { margin-top: 20px; background: #0b0f19; padding: 10px; border-radius: 6px; text-align: left; }
        .dot { display: inline-block; width: 25px; height: 25px; border-radius: 50%; text-align: center; line-height: 25px; font-size: 12px; font-weight: bold; margin-right: 5px; color: #fff; }
        .dot-tai { background: #ee5253; }
        .dot-xiu { background: #10ac84; }
        #chat-content { flex: 1; overflow-y: auto; background: #0b0f19; padding: 10px; border-radius: 6px; margin-bottom: 10px; font-size: 14px; }
        .chat-input-group { display: flex; gap: 5px; }
        .chat-input { flex: 1; background: #1e2942; border: 1px solid #34495e; color: white; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="main-game">
        <div class="header-info">
            <span id="player-name">Đang tải...</span>
            <span style="color: #6c5ce7;">Số dư: <span id="player-balance">0</span>đ</span>
        </div>

        <div id="game-status" style="margin-top: 15px; font-size: 18px; color: #b2bec3;">Trạng thái</div>
        <div class="timer" id="game-timer">30</div>

        <div>Kết quả phiên trước:</div>
        <div class="dice-display" id="dice-result">🎲 🎲 🎲</div>
        <div id="total-result" style="font-size: 18px; font-weight: bold; color: #ff9f43; margin-bottom: 20px;">Tổng: 0 -> Xỉu</div>

        <input type="number" id="bet-amount" class="bet-input" value="10000" placeholder="Nhập số tiền cược...">
        
        <div class="bet-buttons">
            <button class="btn-bet btn-tai" onclick="bet('Tài')">TÀI<br><span id="total-tai" style="font-size:12px; font-weight:normal;">0đ</span></button>
            <button class="btn-bet btn-xiu" onclick="bet('Xỉu')">XỈU<br><span id="total-xiu" style="font-size:12px; font-weight:normal;">0đ</span></button>
        </div>

        <div class="history">
            <div style="margin-bottom: 8px; font-size: 14px; color: #b2bec3;">Lịch sử phiên:</div>
            <div id="history-dots"></div>
        </div>
    </div>

    <div class="chat-section">
        <h3 style="margin-top: 0; border-bottom: 1px solid #233253; padding-bottom: 10px;">💬 Chat Trực Tuyến</h3>
        <div id="chat-content"></div>
        <div class="chat-input-group">
            <input type="text" id="chat-msg" class="chat-input" placeholder="Nhập nội dung...">
            <button style="background: #6c5ce7; border: none; color: white; padding: 0 15px; border-radius: 4px; cursor: pointer;" onclick="sendChat()">Gửi</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let currentBalance = 0;

    socket.on('init-player', (data) => {
        document.getElementById('player-name').innerText = data.name;
        document.getElementById('player-balance').innerText = data.balance.toLocaleString();
        currentBalance = data.balance;
    });

    socket.on('update-balance', (newBalance) => {
        document.getElementById('player-balance').innerText = newBalance.toLocaleString();
        currentBalance = newBalance;
    });

    socket.on('time-update', (state) => {
        document.getElementById('game-timer').innerText = state.timeRemaining;
        document.getElementById('game-status').innerText = state.status + '...';
        document.getElementById('total-tai').innerText = state.totalTai.toLocaleString() + 'đ';
        document.getElementById('total-xiu').innerText = state.totalXiu.toLocaleString() + 'đ';
        
        // Vẽ lại chuỗi lịch sử hạt tròn
        const historyDiv = document.getElementById('history-dots');
        historyDiv.innerHTML = '';
        state.history.forEach(item => {
            const span = document.createElement('span');
            span.className = `dot ${item.type === 'Tài' ? 'dot-tai' : 'dot-xiu'}`;
            span.innerText = item.type === 'Tài' ? 'T' : 'X';
            span.title = `Tổng: ${item.total}`;
            historyDiv.appendChild(span);
        });
    });

    socket.on('game-result', (result) => {
        // Đổi emoji hiển thị xí ngầu tương ứng kết quả thực tế
        const diceEmojis = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        document.getElementById('dice-result').innerText = `${diceEmojis[result.dice[0]-1]} ${diceEmojis[result.dice[1]-1]} ${diceEmojis[result.dice[2]-1]}`;
        document.getElementById('total-result').innerText = `Tổng: ${result.total} -> ${result.type}`;
    });

    socket.on('notification', (msg) => {
        alert(msg);
    });

    function bet(type) {
        const amount = parseInt(document.getElementById('bet-amount').value);
        if(!amount || amount <= 0) return alert('Số tiền cược không hợp lệ');
        socket.emit('place-bet', { type, amount });
    }

    // Xử lý gửi chat
    function sendChat() {
        const input = document.getElementById('chat-msg');
        if(input.value.trim() !== '') {
            socket.emit('send-chat', input.value);
            input.value = '';
        }
    }

    socket.on('receive-chat', (data) => {
        const chatContent = document.getElementById('chat-content');
        chatContent.innerHTML += `<div><strong>${data.name}:</strong> ${data.message}</div>`;
        chatContent.scrollTop = chatContent.scrollHeight; // Tự cuộn xuống tin nhắn mới nhất
    });
</script>
</body>
</html>
