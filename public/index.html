<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sòng Bạc Tài Xỉu Han nghênh các con nghiện</title>
    <style>
        :root { --bg-main: #0a0d14; --bg-card: #141923; --gold: #ffd700; --tai-color: #ff4d4d; --xiu-color: #00db80; }
        body { background: var(--bg-main); color: #e1e7f0; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-wrapper { width: 100%; max-width: 950px; display: grid; grid-template-columns: 2fr 1fr; gap: 15px; }
        
        /* Giao diện Auth */
        .auth-container { background: var(--bg-card); padding: 30px; border-radius: 12px; border: 1px solid #222d3f; text-align: center; max-width: 400px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-container input { width: 90%; background: #0a0d14; border: 1px solid #2a374e; padding: 12px; margin: 8px 0; border-radius: 6px; color: #fff; font-size: 14px; outline: none; }
        .auth-btn { width: 96%; background: linear-gradient(135deg, #f39c12, #d35400); border: none; color: white; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        
        /* Khu vực Game */
        .main-board { background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid #222d3f; text-align: center; position: relative; }
        .user-panel { display: flex; justify-content: space-between; background: #1c2331; padding: 12px 20px; border-radius: 8px; font-weight: bold; border-left: 4px solid var(--gold); margin-bottom: 15px; }
        .status-txt { color: #8a99ad; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .countdown { font-size: 55px; font-weight: 900; color: var(--gold); margin: 10px 0; text-shadow: 0 0 15px rgba(255,215,0,0.4); }
        
        /* Bát Xúc Xắc */
        .plate-zone { background: #0a0d14; padding: 15px 30px; border-radius: 50px; display: inline-block; border: 2px solid #222d3f; font-size: 42px; margin: 15px 0; }
        .result-title { font-size: 22px; font-weight: bold; color: var(--gold); margin-bottom: 25px; }
        
        /* Khu vực nút cược */
        .bet-row { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        .bet-box { flex: 1; padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 24px; color: #fff; border: 1px solid transparent; }
        .box-tai { background: linear-gradient(145deg, #cc2e2e, #851c1c); box-shadow: 0 5px 15px rgba(204,46,46,0.3); }
        .box-xiu { background: linear-gradient(145deg, #00b368, #00663c); box-shadow: 0 5px 15px rgba(0,179,104,0.3); }
        .bet-box:active { transform: scale(0.97); }
        .bet-box span { display: block; font-size: 13px; font-weight: normal; margin-top: 5px; opacity: 0.8; }
        
        .input-money { background: #0a0d14; border: 1px solid #2a374e; color: #fff; padding: 12px; border-radius: 6px; width: 60%; font-size: 16px; text-align: center; font-weight: bold; margin: 10px 0; }
        
        /* Thống kê lịch sử */
        .history-box { margin-top: 20px; background: #0a0d14; padding: 12px; border-radius: 8px; text-align: left; }
        .circle { display: inline-block; width: 26px; height: 26px; border-radius: 50%; text-align: center; line-height: 26px; font-size: 13px; font-weight: bold; margin-right: 6px; margin-top: 5px; color: #fff; }
        .c-tai { background: var(--tai-color); }
        .c-xiu { background: var(--xiu-color); }
        
        /* Chatbox */
        .chat-container { background: var(--bg-card); border: 1px solid #222d3f; border-radius: 12px; display: flex; flex-direction: column; height: 550px; padding: 15px; box-sizing: border-box; }
        #chat-logs { flex: 1; overflow-y: auto; background: #0a0d14; padding: 10px; border-radius: 6px; font-size: 13.5px; margin-bottom: 10px; }
        .chat-input-bar { display: flex; gap: 6px; }
        .chat-input-bar input { flex: 1; background: #0a0d14; border: 1px solid #2a374e; padding: 10px; border-radius: 4px; color: #fff; outline: none; }
        .chat-input-bar button { background: #3867d6; border: none; color: white; padding: 0 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-container">
    <h2 style="color: var(--gold); margin-top: 0;">CASINO TÀI XỈU</h2>
    <p style="color: #8a99ad; font-size: 13px;">Đăng ký tài khoản nhận ngay 500,000đ trải nghiệm</p>
    <input type="text" id="auth-user" placeholder="Tên tài khoản...">
    <input type="password" id="auth-pass" placeholder="Mật khẩu...">
    <button class="auth-btn" onclick="handleAuth('login')">ĐĂNG NHẬP</button>
    <button class="auth-btn" style="background:#2a374e; margin-top:8px;" onclick="handleAuth('register')">ĐĂNG KÝ TÀI KHOẢN</button>
</div>

<div id="game-screen" class="app-wrapper" style="display: none;">
    <div class="main-board">
        <div class="user-panel">
            <span id="lb-user">User: ...</span>
            <span style="color: var(--gold);">Số dư: <span id="lb-balance">0</span> đ</span>
        </div>

        <div id="game-status" class="status-txt">ĐANG ĐỢI PHIÊN...</div>
        <div class="countdown" id="game-timer">00</div>

        <div style="font-size: 13px; color: #8a99ad;">KẾT QUẢ XÚC XẮC:</div>
        <div class="plate-zone" id="dice-view">🎲 🎲 🎲</div>
        <div class="result-title" id="total-view">Tổng: 0 ➔ ...</div>

        <input type="number" id="bet-val" class="input-money" value="50000" step="10000">
        
        <div class="bet-row">
            <div class="bet-box box-tai" onclick="sendBet('Tài')">TÀI<span>Tổng cược: <span id="sum-tai">0đ</span></span></div>
            <div class="bet-box box-xiu" onclick="sendBet('Xỉu')">XỈU<span>Tổng cược: <span id="sum-xiu">0đ</span></span></div>
        </div>

        <div class="history-box">
            <div style="font-size: 13px; color: #8a99ad; font-weight: bold;">LỊCH SỬ PHIÊN GẦN ĐÂY:</div>
            <div id="history-list"></div>
        </div>
    </div>

    <div class="chat-container">
        <h4 style="margin: 0 0 10px 0; border-bottom: 1px solid #222d3f; padding-bottom: 8px; color: var(--gold);">💬 CHAT TRỰC TUYẾN</h4>
        <div id="chat-logs"></div>
        <div class="chat-input-bar">
            <input type="text" id="chat-txt" placeholder="Nhập tin nhắn..." onkeypress="if(event.keyCode===13) pressChat()">
            <button onclick="pressChat()">GỬI</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let clientUsername = "";

    // Xử lý Đăng ký / Đăng nhập qua API
    function handleAuth(type) {
        const username = document.getElementById('auth-user').value.trim();
        const password = document.getElementById('auth-pass').value.trim();
        if(!username || !password) return alert("Vui lòng nhập đầy đủ thông tin!");

        fetch(`/api/${type}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.msg || (data.status === 'success' ? 'Đăng nhập thành công!' : ''));
            if(data.status === 'success' && type === 'login') {
                clientUsername = data.user.username;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'grid';
                document.getElementById('lb-user').innerText = `User: ${data.user.username}`;
                
                // Kích hoạt socket định danh
                socket.emit('join-game', clientUsername);
            }
        });
    }

    // Nhận cập nhật số dư ví
    socket.on('update-balance', (balance) => {
        document.getElementById('lb-balance').innerText = balance.toLocaleString();
    });

    // Cập nhật bộ đếm thời gian và lịch sử phiên theo giây
    socket.on('time-update', (state) => {
        document.getElementById('game-timer').innerText = state.timeRemaining;
        document.getElementById('game-status').innerText = state.status;
        document.getElementById('sum-tai').innerText = state.totalTai.toLocaleString() + 'đ';
        document.getElementById('sum-xiu').innerText = state.totalXiu.toLocaleString() + 'đ';

        // Khởi tạo đồ thị lịch sử chuỗi phiên tròn
        const histList = document.getElementById('history-list');
        histList.innerHTML = '';
        state.history.forEach(h => {
            const span = document.createElement('span');
            span.className = `circle ${h.type === 'Tài' ? 'c-tai' : 'c-xiu'}`;
            span.innerText = h.type === 'Tài' ? 'T' : 'X';
            span.title = `Tổng nút: ${h.total}`;
            histList.appendChild(span);
        });
    });

    // Nhận kết quả mở thưởng xúc xắc công khai
    socket.on('game-result', (res) => {
        const diceMap = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        document.getElementById('dice-view').innerText = `${diceMap[res.dice[0]-1]} ${diceMap[res.dice[1]-1]} ${diceMap[res.dice[2]-1]}`;
        document.getElementById('total-view').innerText = `Tổng: ${res.total} ➔ [${res.type}]`;
    });

    // Thông báo kết quả Thắng/Thua riêng của cá nhân
    socket.on('bet-result', (data) => {
        alert(data.msg);
        document.getElementById('lb-balance').innerText = data.newBalance.toLocaleString();
    });

    socket.on('notification', (msg) => alert(msg));

    // Thực hiện đặt cược
    function sendBet(type) {
        const amount = parseInt(document.getElementById('bet-val').value);
        if(!amount || amount <= 0) return alert('Số tiền cược không đúng!');
        socket.emit('place-bet', { type, amount });
    }

    // Xử lý gửi tin nhắn Chatbox
    function pressChat() {
        const txt = document.getElementById('chat-txt');
        if(txt.value.trim() !== '') {
            socket.emit('send-chat', txt.value);
            txt.value = '';
        }
    }

    socket.on('receive-chat', (data) => {
        const logs = document.getElementById('chat-logs');
        logs.innerHTML += `<div><span style="color:#f39c12; font-weight:bold;">${data.name}:</span> ${data.message}</div>`;
        logs.scrollTop = logs.scrollHeight;
    });
</script>
</body>
</html>
